<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      background: linear-gradient(45deg, #ff4281, #845ec2, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: #ff4281;
      border-color: #ff4281;
      transform: translateY(-2px);
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }

    .certificate-section {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      min-height: 500px;
    }

    .certificate-image {
      max-width: 100%;
      max-height: 450px;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .details-section {
      padding: 1rem;
    }

    .certificate-meta {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .certificate-meta p {
      margin-bottom: 0.75rem;
      color: #b0b0b0;
      line-height: 1.6;
    }

    .certificate-meta strong {
      color: #ffffff;
    }

    .certificate-meta a {
      color: #00e5ff;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .certificate-meta a:hover {
      color: #ff4281;
      text-decoration: underline;
    }

    .workshop-details h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #00e5ff;
    }

    .workshop-topics {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .topic-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s ease;
    }

    .topic-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #00e5ff;
      transform: translateY(-2px);
    }

    .topic-item h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #00e5ff;
      margin-bottom: 0.75rem;
    }

    .topic-item p {
      color: #b0b0b0;
      line-height: 1.6;
      margin: 0;
    }

    .error-message {
      text-align: center;
      padding: 3rem;
      background: rgba(255, 67, 129, 0.1);
      border: 1px solid #ff4281;
      border-radius: 12px;
      color: #ff9671;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .certificate-section {
        min-height: 300px;
      }

      .certificate-image {
        max-height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="title">Certificate Viewer</h1>
      <button class="close-btn" onclick="window.close()">Close</button>
    </div>

    <div id="content">
      <div class="error-message">
        <p>Loading certificate...</p>
      </div>
    </div>
  </div>

  <script>
    // Get certificate data from session storage
    const certificateData = sessionStorage.getItem('selectedCertificate');

    if (certificateData) {
      try {
        const certificate = JSON.parse(certificateData);

        document.getElementById('title').textContent = certificate.name;

        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = `
          <div class="certificate-section">
            <img
              src="${certificate.image}"
              alt="${certificate.name} Certificate"
              class="certificate-image"
              onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22400%22><rect fill=%22%23845ec2%22 width=%22600%22 height=%22400%22/><text x=%22300%22 y=%22200%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2220%22>Certificate Image</text></svg>'"
            />
          </div>
          <div class="details-section">
            <div class="certificate-meta">
              <p><strong>Provider:</strong> <a href="${certificate.website}" target="_blank" rel="noopener noreferrer">${certificate.provider}</a></p>
              <p><strong>Date:</strong> ${certificate.date}</p>
            </div>
            <div class="workshop-details">
              <h2>Workshop Coverage</h2>
              <div class="workshop-topics">
                ${certificate.content.map(item => `
                  <div class="topic-item">
                    <h3>${item.topic}</h3>
                    <p>${item.description}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      } catch (error) {
        console.error('Error parsing certificate data:', error);
        document.getElementById('content').innerHTML = `
          <div class="error-message">
            <p>Error loading certificate. Please try again.</p>
          </div>
        `;
      }
    } else {
      document.getElementById('content').innerHTML = `
        <div class="error-message">
          <p>No certificate data found. Please open certificate from the portfolio.</p>
        </div>
      `;
    }

    // Clear session storage when window closes
    window.addEventListener('beforeunload', () => {
      sessionStorage.removeItem('selectedCertificate');
    });
  </script>
</body>
</html>
